events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    server {
        listen 80;
        server_name localhost;
        
        # Root directory
        root /usr/share/nginx/html;
        index login.html;      # Login page is the default entry point

        # Redirect bare / to login
        location = / {
            return 301 /login.html;
        }

        # Guard: redirect unauthenticated direct access to app/admin pages
        # (client-side JS does the real auth check; nginx provides the fallback redirect)
        
        # Use Docker's internal DNS resolver
        # 127.0.0.11 = Docker embedded DNS — resolves container names dynamically
        # valid=5s means re-resolve every 5s so nginx doesn't cache a missing host at startup
        resolver 127.0.0.11 valid=5s ipv6=off;

        # Proxy API + healthcheck requests to backend (internal container port 8080)
        location ~ ^/(api|healthz)(/|$) {
            # Use a variable so nginx does NOT fail at startup if backend is not yet up
            # Container name used in QNAP/docker-compose is "irs-backend"
            # On local dev it was "backend" — using variable prevents startup failure
            set $backend_host "irs-backend";
            proxy_pass         http://$backend_host:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_connect_timeout 5s;
            proxy_intercept_errors on;
        }

        # Handle all routes (for SPA)
        location / {
            try_files $uri $uri/ /index.html;
        }
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Security: deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}
