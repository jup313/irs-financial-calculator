# IRS Financial Calculator — Local Docker Compose (HTTP only)
#
# Usage:
#   cp .env.example .env    # fill in JWT_SECRET and DEFAULT_ADMIN_PASSWORD
#   docker compose up -d --build
#
# Access: http://localhost:8880

services:

  # ── Backend API (Node.js + SQLite) ──────────────────────────────────────────
  irs-backend:
    container_name: irs-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jup313/irs-financial-calculator:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRY: ${JWT_EXPIRY:-8h}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      DB_PATH: /data/users.db
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-ChangeMe@First!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8880}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_GROUP_ID: ${FACEBOOK_GROUP_ID:-}
    volumes:
      - db-data:/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend (nginx HTTP only) ───────────────────────────────────────────────
  irs-frontend:
    container_name: irs-frontend
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: jup313/irs-frontend:latest
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8880}:80"
    depends_on:
      irs-backend:
        condition: service_healthy

volumes:
  db-data:
    driver: local
