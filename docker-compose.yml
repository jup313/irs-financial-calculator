# Docker Compose reads variables from the .env file in this directory automatically.
# Copy .env.example → .env and fill in values before deploying.

services:

  # ── Node.js API backend ────────────────────────────────────────────────────
  backend:
    container_name: irs-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jup313/irs-financial-calculator:latest
    ports:
      - "8081:8080"          # host 8080 is taken by pihole; backend API on host:8081
    environment:
      NODE_ENV: production
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_GROUP_ID: ${FACEBOOK_GROUP_ID:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://YOUR_SERVER_IP,https://localhost,http://localhost:8081}
      DB_PATH: /data/users.db
    volumes:
      - db-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx — HTTPS + HTTP redirect ─────────────────────────────────────────
  nginx:
    container_name: irs-nginx
    image: nginx:alpine
    ports:
      - "80:80"       # HTTP — redirects to HTTPS
      - "443:443"     # HTTPS — main entry point
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./login.html:/usr/share/nginx/html/login.html:ro
      - ./index.html:/usr/share/nginx/html/app.html:ro
      - ./admin.html:/usr/share/nginx/html/admin.html:ro
      - ./invoices.html:/usr/share/nginx/html/invoices.html:ro
      # SSL certificate volume — generate with: docker compose run --rm certgen
      - ssl-certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── One-shot cert generator — run once to create/renew self-signed cert ───
  # Usage: docker compose run --rm certgen
  certgen:
    image: alpine
    profiles: ["certgen"]   # only runs when explicitly called
    volumes:
      - ssl-certs:/certs
    command: >
      sh -c "
        apk add --no-cache openssl &&
        openssl req -x509 -nodes -days 1825
          -newkey rsa:2048
          -keyout /certs/server.key
          -out    /certs/server.crt
          -subj '/C=US/ST=Local/L=Local/O=IRS Calculator/CN=localhost'
          -addext 'subjectAltName=IP:127.0.0.1,DNS:localhost' &&
        chmod 644 /certs/server.crt &&
        chmod 600 /certs/server.key &&
        echo Certificate generated: &&
        openssl x509 -noout -subject -enddate -in /certs/server.crt
      "

volumes:
  db-data:
    driver: local
  ssl-certs:
    driver: local
