# ─── IRS Financial Calculator — QNAP Container Station Deployment ─────────────
#
# QUICK START:
#   1. Container Station → Applications → Create
#   2. Paste this entire file into the YAML editor
#   3. Edit the 3 values marked ← CHANGE THIS
#   4. Click Deploy
#
# App URL:  http://<QNAP-IP>:8880
# Login:    admin / <DEFAULT_ADMIN_PASSWORD>
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend API (Node.js + SQLite) ──────────────────────────────────────────
  irs-backend:
    image: jup313/irs-financial-calculator:latest
    container_name: irs-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
      JWT_SECRET: "REPLACE_WITH_64_CHAR_RANDOM_SECRET"          # ← CHANGE THIS
      JWT_EXPIRY: "8h"
      BCRYPT_ROUNDS: "12"
      DB_PATH: "/data/users.db"
      DEFAULT_ADMIN_PASSWORD: "ChangeMe@First!"                 # ← CHANGE THIS
      CORS_ORIGINS: "http://REPLACE_WITH_QNAP_IP:8880"         # ← CHANGE THIS
      FACEBOOK_APP_ID: ""
      FACEBOOK_APP_SECRET: ""
      FACEBOOK_GROUP_ID: ""
    volumes:
      - irs-db:/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend (nginx HTTP only) ───────────────────────────────────────────────
  irs-frontend:
    image: jup313/irs-frontend:latest
    container_name: irs-frontend
    restart: unless-stopped
    ports:
      - "8880:80"
    depends_on:
      irs-backend:
        condition: service_healthy

volumes:
  irs-db:
    driver: local
