# ─── IRS Financial Calculator — QNAP Container Station 3.x Deployment ────────
#
# QUICK START:
#   1. Open Container Station → Applications → Create
#   2. Paste this entire file into the YAML editor
#   3. Fill in the REQUIRED values marked with  ← CHANGE THIS
#   4. Click Deploy
#
# App URL after deploy:  http://<your-qnap-ip>:8880
# First login: admin / <your DEFAULT_ADMIN_PASSWORD>
# ──────────────────────────────────────────────────────────────────────────────

version: "3.8"

services:

  irs-backend:
    image: ghcr.io/YOUR_GITHUB_USERNAME/irs-calculator-backend:latest
    container_name: irs-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"

      # ── REQUIRED: Strong random secret (min 32 chars) ──────────────────────
      # Generate one at: https://generate-secret.vercel.app/64
      JWT_SECRET: "REPLACE_WITH_64_CHAR_RANDOM_SECRET"   # ← CHANGE THIS

      JWT_EXPIRY: "8h"
      BCRYPT_ROUNDS: "12"
      DB_PATH: "/data/users.db"

      # ── REQUIRED: Set to your QNAP IP ──────────────────────────────────────
      # Found in: QNAP → Control Panel → Network & Virtual Switch
      CORS_ORIGINS: "http://YOUR_QNAP_IP:8880"           # ← CHANGE THIS

      # ── First admin account password (created on first startup) ────────────
      DEFAULT_ADMIN_PASSWORD: "ChangeMe@First!"           # ← CHANGE THIS

      # ── Facebook integration (optional — leave blank to disable) ───────────
      FACEBOOK_APP_ID: ""
      FACEBOOK_APP_SECRET: ""
      FACEBOOK_GROUP_ID: ""

    volumes:
      - irs-db:/data

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    expose:
      - "8080"

  irs-frontend:
    image: ghcr.io/YOUR_GITHUB_USERNAME/irs-calculator-frontend:latest
    container_name: irs-frontend
    restart: unless-stopped
    ports:
      - "8880:80"   # Change 8880 if port is already used on your QNAP
    depends_on:
      irs-backend:
        condition: service_healthy

volumes:
  irs-db:
    driver: local
